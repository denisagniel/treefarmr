# Test coverage workflow for TreeFARMR package
# Runs comprehensive test coverage analysis

name: Test Coverage

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    # Run weekly on Mondays at 3 AM UTC
    - cron: '0 3 * * 1'

jobs:
  coverage:
    runs-on: ubuntu-latest
    
    env:
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: true
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev

      - name: Cache R packages
        uses: actions/cache@v3
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-coverage-${{ hashFiles('.github/workflows/test-coverage.yml') }}
          restore-keys: ${{ runner.os }}-coverage-

      - name: Install R package dependencies
        run: |
          install.packages(c("remotes", "covr", "testthat", "DT", "htmltools"))
          remotes::install_deps(dependencies = TRUE)

      - name: Run test coverage
        run: |
          Rscript -e "
          # Run coverage analysis
          cov <- covr::package_coverage()
          
          # Print coverage summary
          print(covr::coverage_to_list(cov))
          
          # Generate coverage report
          covr::report(cov, file = 'coverage.html')
          
          # Save coverage data
          saveRDS(cov, 'coverage.rds')
          "

      - name: Check coverage threshold
        run: |
          Rscript -e "
          # Load coverage data
          cov <- readRDS('coverage.rds')
          
          # Calculate overall coverage
          overall_cov <- covr::percent_coverage(cov)
          
          # Check if coverage meets minimum threshold (80%)
          min_coverage <- 80
          if (overall_cov < min_coverage) {
            stop('Coverage is ', round(overall_cov, 2), '% which is below the minimum threshold of ', min_coverage, '%')
          } else {
            cat('Coverage is ', round(overall_cov, 2), '% which meets the minimum threshold of ', min_coverage, '%\n')
          }
          "

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: |
            coverage.html
            coverage.rds

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: coverage
          name: codecov-coverage
          fail_ci_if_error: false

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Read coverage data
            const coverageData = fs.readFileSync('coverage.rds', 'base64');
            
            // This would need to be implemented with proper R script
            // For now, just comment that coverage was run
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Test coverage analysis completed. Check the artifacts for detailed coverage report.'
            });

  coverage-details:
    runs-on: ubuntu-latest
    needs: coverage
    if: github.event_name == 'pull_request'
    
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Download coverage report
        uses: actions/download-artifact@v3
        with:
          name: coverage-report
          path: ./

      - name: Generate detailed coverage report
        run: |
          Rscript -e "
          # Load coverage data
          cov <- readRDS('coverage.rds')
          
          # Generate detailed report
          covr::report(cov, file = 'detailed-coverage.html', browse = FALSE)
          
          # Print function-level coverage
          cat('Function-level coverage:\n')
          print(covr::coverage_to_list(cov))
          "

      - name: Upload detailed coverage report
        uses: actions/upload-artifact@v3
        with:
          name: detailed-coverage-report
          path: detailed-coverage.html
